<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Roots - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background: linear-gradient(135deg, #006838 0%, #55833d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 400px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
        }
        .login-title {
            text-align: center;
            color: #006838;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .login-subtitle {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .login-form input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }
        .login-form input:focus {
            outline: none;
            border-color: #006838;
            box-shadow: 0 0 0 3px rgba(0, 104, 56, 0.1);
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #006838 0%, #55833d 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 104, 56, 0.3);
        }
        .login-footer {
            text-align: center;
            color: #999;
            font-size: 14px;
        }
        .login-footer a {
            color: #006838;
            text-decoration: none;
            font-weight: 600;
        }
        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <img src="images/logo.png" alt="Urban Roots Logo">
        </div>
        
        <h2 class="login-title">Urban Roots</h2>
        <p class="login-subtitle">Welcome back to your plant paradise</p>
        
        <form class="login-form" onsubmit="handleLogin(event)">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="login-btn">Login</button>
        </form>
        
        <div class="login-footer">
            <p>Don't have an account? <a href="#" onclick="showSignup()">Sign Up</a></p>
        </div>
    </div>

    <!-- Sign Up Modal -->
    <div id="signup-modal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="color: #006838; font-size: 20px;">Create Account</h3>
                <button style="background: none; border: none; font-size: 24px; cursor: pointer; color: #999;" onclick="closeSignup()">×</button>
            </div>
            
            <form onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="signup-username" placeholder="Choose a username" required>
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signup-email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" placeholder="Create a password" required>
                </div>
                
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="signup-confirm-password" placeholder="Confirm password" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" style="padding: 12px; margin-bottom: 10px;">Create Account</button>
                <button type="button" class="btn" style="background-color: #999; color: white; width: 100%; padding: 12px;" onclick="closeSignup()">Cancel</button>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
